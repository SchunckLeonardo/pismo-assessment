services:
  postgres:
    image: postgres:16-alpine
    container_name: customerassessment-postgres
    environment:
      POSTGRES_DB: customerassessment
      POSTGRES_USER: pismo
      POSTGRES_PASSWORD: pismo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - customerassessment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pismo -d customerassessment"]
      interval: 10s
      timeout: 5s
      retries: 5

  application:
    build:
      context: .
      dockerfile: Dockerfile
    image: customerassessment:latest
    container_name: customerassessment-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: customerassessment
      DB_USERNAME: pismo
      DB_PASSWORD: pismo
    ports:
      - "8080:8080"
    networks:
      - customerassessment-network

volumes:
  postgres_data:

networks:
  customerassessment-network:
    driver: bridge
